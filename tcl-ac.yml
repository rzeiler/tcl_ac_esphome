esphome:
  name: tcl-ac

esp8266:
  board: esp07

external_components:
  - source:
      type: git
      url: https://github.com/rzeiler/tcl_ac_esphome.git
      ref: main
    components: [tcl_climate]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

ota:
  password: 123

uart:
  id: uart_bus
  tx_pin: 1
  rx_pin: 3
  baud_rate: 9600
  parity: EVEN

logger:
  level: VERBOSE
  baud_rate: 0

climate:
  - platform: tcl_climate
    id: tcl_custom_climate
    uart_id: uart_bus
    name: "HAVC TCL"

 